<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiHielo English Academy</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <style>
        :root {
            --primary: #2c3e50;
            --medical-blue: #005f73;
            --general-gold: #b08968;
            --accent: #3498db;
            --success: #27ae60;
            --bg: #f8f9fa;
            --white: #ffffff;
            --locked: #e0e0e0;
            --danger: #e74c3c;
        }
 
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            transition: background 0.5s ease;
        }
 
        header {
            background: var(--primary);
            color: white;
            width: 100%;
            padding: 1.5rem 0;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.5s ease;
        }

        header img {
            max-width: 100px;
            border-radius: 50%;
            margin-bottom: 10px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            background: #eee; /* Placeholder circular */
        }
 
        .container {
            width: 90%;
            max-width: 850px;
            margin: 2rem 0;
            background: var(--white);
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            position: relative;
        }
 
        .hidden { display: none; }

        /* LANDING PAGE CARDS */
        .landing-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .branch-card {
            padding: 40px 20px;
            text-align: center;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            color: white;
            font-size: 1.3rem;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .branch-card.medical { background: var(--medical-blue); }
        .branch-card.general { background: var(--general-gold); }
        .branch-card:hover { transform: translateY(-5px); filter: brightness(1.1); }
 
        .level-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
 
        .level-card {
            padding: 20px;
            text-align: center;
            border: 2px solid #eee;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            transition: all 0.3s;
            font-weight: bold;
        }

        .level-card.completed::after {
            content: "✓";
            position: absolute;
            top: 5px;
            right: 8px;
            color: var(--success);
            font-size: 1.2rem;
        }
 
        .level-card:hover:not(.locked) { border-color: var(--accent); color: var(--accent); }
        .level-card.locked { background: var(--locked); color: #999; cursor: not-allowed; }

        /* QUIZ SPECIFICS */
        .option { padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .correct { background: #d4edda !important; color: #155724; border-color: var(--success) !important; }
        .wrong { background: #f8d7da !important; color: #721c24; border-color: #f5c6cb !important; }
        
        button { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }

        /* MATCHING COLUMNS */
        .matching-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .match-item { padding: 12px; margin: 5px 0; background: #fff; border: 2px solid #eee; border-radius: 8px; cursor: pointer; text-align: center; font-weight: 600; min-height: 40px; display: flex; align-items: center; justify-content: center; }
        .match-item.selected { border-color: var(--accent); background: #e3f2fd; }
        .match-item.locked-success { background: var(--success); color: white; border-color: var(--success); cursor: default; }

        /* MEMORY */
        .memory-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .memory-card { height: 100px; position: relative; transform-style: preserve-3d; transition: 0.5s; cursor: pointer; }
        .memory-card.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; text-align: center; padding: 5px; border-radius: 8px; box-sizing: border-box; }
        .card-front { background: var(--accent); color: white; font-size: 1.5rem; }
        .card-back { background: white; color: var(--primary); border: 2px solid var(--accent); transform: rotateY(180deg); font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>
 
<header id="app-header">
    <img src="logo.png" alt="Logo" id="header-logo" onerror="this.style.visibility='hidden'">
    <h1 id="header-title">DiHielo English Academy</h1>
</header>
 
<div class="container" id="screen-login">
    <h2>Student Access</h2>
    <input type="text" id="student-name" style="width:100%; padding:12px; margin-bottom:20px; border-radius:8px; border:2px solid #ddd; box-sizing:border-box;" placeholder="Enter your name">
    <button onclick="login()">Access Academy</button>
</div>
 
<div class="container hidden" id="screen-landing">
    <h2>Welcome, <span id="user-display"></span>!</h2>
    <p>Choose your study branch:</p>
    <div class="landing-grid">
        <div class="branch-card medical" onclick="selectBranch('medical')">
            DR. DIHIELO<br>Medical English
        </div>
        <div class="branch-card general" onclick="selectBranch('general')">
            DIHIELO<br>General English
        </div>
    </div>
</div>
 
<div class="container hidden" id="screen-quiz-list">
    <button onclick="showScreen('screen-landing')" style="background:#95a5a6; width:auto; padding:8px 15px; margin-bottom:15px; border-radius:5px;">← Change Branch</button>
    <h2 id="branch-title">Learning Modules</h2>
    <div id="quiz-list-container" class="level-grid"></div>
</div>
 
<div class="container hidden" id="screen-quiz">
    <button class="btn-back" onclick="showScreen('screen-quiz-list')" style="width:auto; margin-bottom:15px;">← Back</button>
    <div id="q-text" style="font-weight:bold; margin-bottom:15px; font-size:1.2rem;"></div>
    <div id="options-box"></div>
    <div id="feedback-box" class="hidden" style="padding:15px; background:#eef2f7; border-left:5px solid var(--accent); margin-top:15px;"></div>
    <button id="btn-continue" class="hidden" onclick="nextQuestion()" style="margin-top: 20px;">Continue</button>
</div>

<div class="container hidden" id="screen-memory">
    <button class="btn-back" onclick="exitMemory()" style="width:auto; margin-bottom:15px;">← Back</button>
    <div id="memory-board" class="memory-grid"></div>
</div>

<div class="container hidden" id="screen-matching">
    <button class="btn-back" onclick="showScreen('screen-quiz-list')" style="width:auto; margin-bottom:15px;">← Back</button>
    <div class="matching-container">
        <div id="col-left"></div>
        <div id="col-right"></div>
    </div>
</div>
 
<div class="container hidden" id="screen-results">
    <h2>Module Complete!</h2>
    <div style="font-size: 3rem; margin: 20px 0;" id="final-score"></div>
    <button onclick="showScreen('screen-quiz-list')">Back to Dashboard</button>
</div>
 
<script>
    // BASE DE DATOS ÍNTEGRA
    const quizData = [
        {id: 1, type: "MC", name: "Grammar Basics", cat: "general", data: [
            {q: "I __________ English since 2013.", o: ["learn", "have learned", "am learning"], a: 1, r: "Present Perfect for actions starting in the past."}
        ]},
        {id: 2, type: "Writing", name: "Writing Skills", cat: "general", data: [
            {q: "By next year, I __________ (finish) the course.", a: "will have finished", r: "Future Perfect logic."}
        ]},
        {id: 3, type: "MC", name: "Stones vs Eggshells", cat: "medical", data: [
            {q: "Look after", o: ["Stone (Inseparable)", "Eggshell (Separable)"], a: 0, r: "You can't say 'Look the patient after'."}
        ]},
        {id: 4, type: "Memory", name: "Medical Vocab", cat: "medical", pairs: [
            {v: "Rule out", m: "To eliminate a possibility"},
            {v: "Pass out", m: "To lose consciousness"},
            {v: "Carry out", m: "To perform a task"}
        ]},
        {id: 5, type: "Matching", name: "Collocations", cat: "medical", pairs: [
            {a: "Take", b: "a medical history"}, {a: "Stabbing", b: "pain"},
            {a: "Make", b: "a full recovery"}, {a: "Do", b: "business"},
            {a: "Pay", b: "attention"}, {a: "Catch", b: "a cold"}
        ]}
    ];
 
    let user = "", currentBranch = "", currentQuiz = null, currentIdx = 0, score = 0;
    let selectedLeft = null, selectedRight = null, matchedCount = 0;
    let progress = JSON.parse(localStorage.getItem('dihielo_progress')) || {};

    function showScreen(id) {
        document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function login() {
        user = document.getElementById('student-name').value;
        if(!user) return alert("Please enter your name");
        document.getElementById('user-display').innerText = user;
        showScreen('screen-landing');
    }

    function selectBranch(branch) {
        currentBranch = branch;
        const header = document.getElementById('app-header');
        const title = document.getElementById('header-title');
        
        if(branch === 'medical') {
            header.style.background = "var(--medical-blue)";
            title.innerText = "Dr. DiHielo Medical English Academy";
            document.getElementById('branch-title').innerText = "Medical Specialization";
        } else {
            header.style.background = "var(--general-gold)";
            title.innerText = "DiHielo English Academy";
            document.getElementById('branch-title').innerText = "General English Skills";
        }
        renderQuizList();
        showScreen('screen-quiz-list');
    }

    function renderQuizList() {
        const container = document.getElementById('quiz-list-container');
        container.innerHTML = "";
        
        // Filtro: General aparece en ambos, Medical solo en Medical.
        const filtered = quizData.filter(q => currentBranch === 'medical' || q.cat === 'general');
        
        filtered.forEach(q => {
            const card = document.createElement('div');
            const isDone = progress[q.id] ? "completed" : "";
            card.className = `level-card ${isDone}`;
            card.innerHTML = `${q.name}<br><small>${q.type}</small>`;
            card.onclick = () => startQuiz(q);
            container.appendChild(card);
        });
    }

    function startQuiz(quiz) {
        currentQuiz = quiz; currentIdx = 0; score = 0;
        if(quiz.type === "Memory") startMemory();
        else if(quiz.type === "Matching") startMatching();
        else { showScreen('screen-quiz'); renderQuestion(); }
    }

    function renderQuestion() {
        const q = currentQuiz.data[currentIdx];
        document.getElementById('q-text').innerText = q.q;
        const box = document.getElementById('options-box');
        box.innerHTML = "";
        document.getElementById('feedback-box').classList.add('hidden');
        document.getElementById('btn-continue').classList.add('hidden');

        if(currentQuiz.type === "Writing") {
            box.innerHTML = `<input type="text" id="ans-w" style="width:100%; padding:10px; margin-bottom:10px;"><button onclick="checkW()">Check Answer</button>`;
        } else {
            q.o.forEach((opt, i) => {
                const d = document.createElement('div'); d.className = 'option'; d.innerText = opt;
                d.onclick = () => {
                    if(i === q.a) { d.classList.add('correct'); score++; }
                    else { d.classList.add('wrong'); box.children[q.a].classList.add('correct'); }
                    finishStep(q.r);
                };
                box.appendChild(d);
            });
        }
    }

    function checkW() {
        const val = document.getElementById('ans-w').value.trim().toLowerCase();
        const q = currentQuiz.data[currentIdx];
        if(val === q.a.toLowerCase()) score++; else alert("Correct: " + q.a);
        finishStep(q.r);
    }

    function finishStep(r) {
        document.querySelectorAll('.option').forEach(o => o.onclick = null);
        document.getElementById('feedback-box').innerText = r;
        document.getElementById('feedback-box').classList.remove('hidden');
        document.getElementById('btn-continue').classList.remove('hidden');
    }

    function nextQuestion() {
        currentIdx++;
        if(currentIdx < currentQuiz.data.length) renderQuestion();
        else finishQuiz();
    }

    function startMemory() {
        showScreen('screen-memory');
        matchedCount = 0;
        let cards = [];
        currentQuiz.pairs.forEach((p, i) => {
            cards.push({t: p.v, id: i}, {t: p.m, id: i});
        });
        cards.sort(() => Math.random() - 0.5);
        const board = document.getElementById('memory-board');
        board.innerHTML = "";
        cards.forEach(c => {
            const div = document.createElement('div'); div.className = 'memory-card';
            div.dataset.id = c.id;
            div.innerHTML = `<div class="card-face card-front">?</div><div class="card-back card-face">${c.t}</div>`;
            div.onclick = () => {
                if(div.classList.contains('flipped') || selectedLeft) return;
                div.classList.add('flipped');
                const flipped = document.querySelectorAll('.memory-card.flipped:not(.matched)');
                if(flipped.length === 2) {
                    selectedLeft = true;
                    if(flipped[0].dataset.id === flipped[1].dataset.id) {
                        flipped.forEach(f => f.classList.add('matched'));
                        matchedCount++;
                        selectedLeft = false;
                        if(matchedCount === currentQuiz.pairs.length) setTimeout(finishQuiz, 500);
                    } else {
                        setTimeout(() => { flipped.forEach(f => f.classList.remove('flipped')); selectedLeft = false; }, 800);
                    }
                }
            };
            board.appendChild(div);
        });
    }

    function startMatching() {
        showScreen('screen-matching');
        const lBox = document.getElementById('col-left');
        const rBox = document.getElementById('col-right');
        lBox.innerHTML = ""; rBox.innerHTML = ""; matchedCount = 0;
        let lefts = [...currentQuiz.pairs].sort(() => Math.random() - 0.5);
        let rights = [...currentQuiz.pairs].sort(() => Math.random() - 0.5);
        
        lefts.forEach(p => {
            const d = document.createElement('div'); d.className='match-item'; d.innerText=p.a;
            d.onclick = () => { if(selectedLeft) selectedLeft.el.classList.remove('selected'); selectedLeft={el:d, val:p.b}; d.classList.add('selected'); checkM(); };
            lBox.appendChild(d);
        });
        rights.forEach(p => {
            const d = document.createElement('div'); d.className='match-item'; d.innerText=p.b;
            d.onclick = () => { if(selectedRight) selectedRight.el.classList.remove('selected'); selectedRight={el:d, val:p.b}; d.classList.add('selected'); checkM(); };
            rBox.appendChild(d);
        });
    }

    function checkM() {
        if(selectedLeft && selectedRight) {
            if(selectedLeft.val === selectedRight.val) {
                selectedLeft.el.classList.add('locked-success'); selectedRight.el.classList.add('locked-success');
                matchedCount++; if(matchedCount === currentQuiz.pairs.length) setTimeout(finishQuiz, 500);
            } else {
                const a=selectedLeft.el, b=selectedRight.el;
                setTimeout(() => { a.classList.remove('selected'); b.classList.remove('selected'); }, 400);
            }
            selectedLeft = null; selectedRight = null;
        }
    }

    function finishQuiz() {
        progress[currentQuiz.id] = true;
        localStorage.setItem('dihielo_progress', JSON.stringify(progress));
        showScreen('screen-results');
        document.getElementById('final-score').innerText = (currentQuiz.type === "MC" || currentQuiz.type === "Writing") ? `${score}/${currentQuiz.data.length}` : "Completed!";
        renderQuizList();
    }

    function exitMemory() { showScreen('screen-quiz-list'); }
</script>
</body>
</html>
