<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiHielo English Academy</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <style>
        :root {
            --primary: #2c3e50;
            --medical-blue: #005f73;
            --general-gold: #b08968;
            --accent: #3498db;
            --success: #27ae60;
            --bg: #f8f9fa;
            --white: #ffffff;
            --locked: #f1f1f1;
            --text-muted: #7f8c8d;
        }
 
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
 
        header {
            background: var(--primary);
            color: white;
            width: 100%;
            padding: 1.5rem 0;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.4s;
        }

        header h1 { margin: 10px 0 0; font-size: 1.4rem; }
        .siglas-logo { font-weight: 900; font-size: 2rem; letter-spacing: -2px; opacity: 0.9; }
 
        .container {
            width: 90%;
            max-width: 850px;
            margin: 2rem 0;
            background: var(--white);
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
 
        .hidden { display: none; }

        /* LANDING & BRANCHES */
        .landing-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .branch-card {
            padding: 40px 20px;
            text-align: center;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            color: white;
            font-weight: bold;
        }
        .branch-card.medical { background: var(--medical-blue); }
        .branch-card.general { background: var(--general-gold); }
        .branch-card:hover { transform: translateY(-5px); filter: brightness(1.1); }

        /* LEVELS GRID */
        .level-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .level-card {
            padding: 20px;
            text-align: center;
            border: 2px solid #eee;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }
        .level-card:hover:not(.locked) { border-color: var(--accent); color: var(--accent); }
        .level-card.locked { background: var(--locked); color: var(--text-muted); cursor: not-allowed; opacity: 0.7; }

        /* QUIZ LIST */
        .quiz-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border: 1px solid #eee;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .quiz-item:hover { background: #f9f9f9; border-color: var(--accent); }
        .quiz-item.completed::after { content: '✓'; color: var(--success); font-weight: bold; font-size: 1.2rem; }

        .btn-nav {
            background: #eee;
            color: var(--primary);
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
            font-weight: 600;
        }

        /* QUIZ COMPONENTS */
        .option { padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; }
        .correct { background: #d4edda; color: #155724; border-color: var(--success); }
        .wrong { background: #f8d7da; color: #721c24; border-color: #f5c6cb; }
        button.primary { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
 
<header id="app-header">
    <div class="siglas-logo">A.D.</div>
    <h1 id="header-title">DiHielo English Academy</h1>
</header>
 
<div class="container" id="screen-login">
    <h2 style="text-align:center">Welcome back</h2>
    <input type="text" id="student-name" style="width:100%; padding:15px; margin-bottom:20px; border-radius:8px; border:1px solid #ddd; box-sizing:border-box;" placeholder="Student Name">
    <button class="primary" onclick="login()">Enter Platform</button>
</div>
 
<div class="container hidden" id="screen-landing">
    <h2>Hello, <span id="user-display"></span></h2>
    <p>Select your academy branch:</p>
    <div class="landing-grid">
        <div class="branch-card medical" onclick="selectBranch('medical')">MEDICAL ENGLISH</div>
        <div class="branch-card general" onclick="selectBranch('general')">GENERAL ENGLISH</div>
    </div>
</div>

<div class="container hidden" id="screen-levels">
    <button class="btn-nav" onclick="showScreen('screen-landing')">← Back to Branches</button>
    <h2 id="lvl-title">Select Level</h2>
    <div class="level-grid">
        <div class="level-card locked">A1</div>
        <div class="level-card locked">A2</div>
        <div class="level-card locked">B1</div>
        <div class="level-card" onclick="goToQuizzes('B2')">B2</div>
        <div class="level-card locked">C1</div>
        <div class="level-card locked">C2</div>
    </div>
</div>
 
<div class="container hidden" id="screen-quiz-list">
    <button class="btn-nav" onclick="showScreen('screen-levels')">← Back to Levels</button>
    <h2 id="list-title">B2 Modules</h2>
    <div id="quiz-list-container"></div>
</div>
 
<div class="container hidden" id="screen-quiz">
    <button class="btn-nav" onclick="showScreen('screen-quiz-list')">← Exit Quiz</button>
    <div id="q-text" style="font-size: 1.2rem; margin-bottom: 20px; font-weight: 600;"></div>
    <div id="options-box"></div>
    <div id="feedback-box" class="hidden" style="margin-top:20px; padding:15px; background:#f0f7ff; border-radius:8px"></div>
    <button id="btn-continue" class="hidden primary" onclick="nextQuestion()" style="margin-top:20px">Next</button>
</div>

<div class="container hidden" id="screen-results">
    <h2 style="text-align:center">Well done!</h2>
    <div id="final-score" style="text-align:center; font-size:3rem; margin:20px 0"></div>
    <button class="primary" onclick="showScreen('screen-quiz-list')">Return to Dashboard</button>
</div>
 
<script>
    const quizData = [
        {id: 1, lvl: "B2", branch: "general", name: "Grammar: Narrative Tenses", data: [
            {q: "I __________ English for years before I moved to London.", o: ["learned", "had been learning", "was learning"], a: 1, r: "Past Perfect Continuous for a duration before a past point."}
        ]},
        {id: 2, lvl: "B2", branch: "medical", name: "Stones vs Eggshells", data: [
            {q: "Look after", o: ["Stone (Inseparable)", "Eggshell (Separable)"], a: 0, r: "Stone: 'Look after the patient', not 'Look the patient after'."}
        ]},
        {id: 3, lvl: "B2", branch: "medical", name: "Vocabulary: Admission Note", data: [
            {q: "Patient __________ with acute abdominal pain.", o: ["presents", "presents self", "presenting"], a: 0, r: "Standard medical phrasing: 'Patient presents with...'"}
        ]}
    ];

    let user = "", currentBranch = "", currentLvl = "", currentQuiz = null, currentIdx = 0, score = 0;
    let progress = JSON.parse(localStorage.getItem('dihielo_progress')) || {};

    function showScreen(id) {
        document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function login() {
        user = document.getElementById('student-name').value;
        if(!user) return;
        document.getElementById('user-display').innerText = user;
        showScreen('screen-landing');
    }

    function selectBranch(branch) {
        currentBranch = branch;
        const header = document.getElementById('app-header');
        const title = document.getElementById('header-title');
        if(branch === 'medical') {
            header.style.background = "var(--medical-blue)";
            title.innerText = "Dr. DiHielo Medical English Academy";
        } else {
            header.style.background = "var(--general-gold)";
            title.innerText = "DiHielo English Academy";
        }
        showScreen('screen-levels');
    }

    function goToQuizzes(lvl) {
        currentLvl = lvl;
        document.getElementById('list-title').innerText = `${lvl} - Learning Modules`;
        renderQuizList();
        showScreen('screen-quiz-list');
    }

    function renderQuizList() {
        const container = document.getElementById('quiz-list-container');
        container.innerHTML = "";
        // Regla: General sale en ambos, Medical solo en Medical.
        const list = quizData.filter(q => q.lvl === currentLvl && (currentBranch === 'medical' || q.branch === 'general'));
        
        list.forEach(q => {
            const item = document.createElement('div');
            const isDone = progress[q.id] ? "completed" : "";
            item.className = `quiz-item ${isDone}`;
            item.innerHTML = `<span>${q.name}</span>`;
            item.onclick = () => startQuiz(q);
            container.appendChild(item);
        });

        // Simulación de "espacios por llenar"
        for(let i=1; i<=5; i++) {
            const empty = document.createElement('div');
            empty.className = "quiz-item";
            empty.style.opacity = "0.4";
            empty.innerHTML = `<span style="color:#999 italic">Coming Soon...</span>`;
            container.appendChild(empty);
        }
    }

    function startQuiz(quiz) {
        currentQuiz = quiz; currentIdx = 0; score = 0;
        showScreen('screen-quiz');
        renderQuestion();
    }

    function renderQuestion() {
        const q = currentQuiz.data[currentIdx];
        document.getElementById('q-text').innerText = q.q;
        const box = document.getElementById('options-box');
        box.innerHTML = "";
        document.getElementById('feedback-box').classList.add('hidden');
        document.getElementById('btn-continue').classList.add('hidden');

        q.o.forEach((opt, i) => {
            const d = document.createElement('div'); d.className = 'option'; d.innerText = opt;
            d.onclick = () => {
                document.querySelectorAll('.option').forEach(el => el.onclick = null);
                if(i === q.a) { d.classList.add('correct'); score++; }
                else { d.classList.add('wrong'); box.children[q.a].classList.add('correct'); }
                document.getElementById('feedback-box').innerText = q.r;
                document.getElementById('feedback-box').classList.remove('hidden');
                document.getElementById('btn-continue').classList.remove('hidden');
            };
            box.appendChild(d);
        });
    }

    function nextQuestion() {
        currentIdx++;
        if(currentIdx < currentQuiz.data.length) renderQuestion();
        else {
            progress[currentQuiz.id] = true;
            localStorage.setItem('dihielo_progress', JSON.stringify(progress));
            showScreen('screen-results');
            document.getElementById('final-score').innerText = `${score} / ${currentQuiz.data.length}`;
        }
    }
</script>
</body>
</html>
